# GitLab CI/CD — {{.ServiceName}} (Helm deploy)
# Generated by TernakClouds IDP

stages:
  - build
  - deploy

variables:
  SERVICE_NAME: {{.ServiceName}}
  REGISTRY: {{if .RegistryEndpoint}}{{.RegistryEndpoint}}{{else}}registry.gitlab.com{{end}}
  IMAGE_PATH: {{if .ImagePath}}{{.ImagePath}}{{else}}$CI_PROJECT_PATH/{{.ServiceName}}{{end}}
  K8S_NAMESPACE: {{.K8sNamespace}}

build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $REGISTRY
  script:
    - docker build -t $REGISTRY/$IMAGE_PATH:$CI_COMMIT_SHORT_SHA -t $REGISTRY/$IMAGE_PATH:latest .
    - docker push $REGISTRY/$IMAGE_PATH:$CI_COMMIT_SHORT_SHA
    - docker push $REGISTRY/$IMAGE_PATH:latest
  only:
    - {{.Branch}}

deploy:{{.EnvironmentLabel}}:
  stage: deploy
  image: alpine/helm:latest
  environment:
    name: {{.EnvironmentLabel}}
  before_script:
    - mkdir -p $HOME/.kube
    - echo "$KUBE_CONFIG_DATA" | base64 -d > $HOME/.kube/config
    - chmod 600 $HOME/.kube/config
  script:
    - |
      helm upgrade --install {{.ServiceName}} ./chart \
        --namespace $K8S_NAMESPACE \
        --create-namespace \
        --set image.repository=$REGISTRY/$IMAGE_PATH \
        --set image.tag=$CI_COMMIT_SHORT_SHA \
        --set environment={{.EnvironmentLabel}} \
        --wait --timeout 120s \
        --atomic
  only:
    - {{.Branch}}
