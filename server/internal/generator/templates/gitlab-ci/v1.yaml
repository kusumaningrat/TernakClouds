# GitLab CI/CD — {{.ServiceName}}
# Generated by TernakClouds IDP

stages:
  - build
  - deploy

variables:
  SERVICE_NAME: {{.ServiceName}}
  REGISTRY: {{if .RegistryEndpoint}}{{.RegistryEndpoint}}{{else}}registry.gitlab.com{{end}}
  IMAGE_PATH: {{if .ImagePath}}{{.ImagePath}}{{else}}$CI_PROJECT_PATH/{{.ServiceName}}{{end}}

.build_template: &build_template
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $REGISTRY
  script:
    - docker build -t $REGISTRY/$IMAGE_PATH:$CI_COMMIT_SHORT_SHA -t $REGISTRY/$IMAGE_PATH:latest .
    - docker push $REGISTRY/$IMAGE_PATH:$CI_COMMIT_SHORT_SHA
    - docker push $REGISTRY/$IMAGE_PATH:latest

build:
  <<: *build_template
  stage: build
  only:
    - {{.Branch}}

deploy:{{.EnvironmentLabel}}:
  stage: deploy
  image: curlimages/curl:latest
  environment:
    name: {{.EnvironmentLabel}}
  script:
    - |
      curl -X POST "$TERNAK_IDP_URL/api/v1/workspaces/$TERNAK_WORKSPACE/environments/{{.EnvironmentLabel}}/platform-apps/$SERVICE_NAME/redeploy" \
        -H "Authorization: Bearer $TERNAK_IDP_TOKEN" \
        -H "Content-Type: application/json" \
        -d "{\"image_tag\":\"$CI_COMMIT_SHORT_SHA\"}"
  only:
    - {{.Branch}}
