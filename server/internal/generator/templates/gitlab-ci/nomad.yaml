# GitLab CI/CD — {{.ServiceName}} (Nomad deploy)
# Generated by TernakClouds IDP

stages:
  - build
  - deploy

variables:
  SERVICE_NAME: {{.ServiceName}}
  REGISTRY: {{if .RegistryEndpoint}}{{.RegistryEndpoint}}{{else}}registry.gitlab.com{{end}}
  IMAGE_PATH: {{if .ImagePath}}{{.ImagePath}}{{else}}$CI_PROJECT_PATH/{{.ServiceName}}{{end}}
  NOMAD_NAMESPACE: {{.Namespace}}

build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $REGISTRY
  script:
    - docker build -f {{if .BuildContext}}./{{.BuildContext}}/{{.DockerfileName}}{{else}}{{.DockerfileName}}{{end}} -t $REGISTRY/$IMAGE_PATH:$CI_COMMIT_SHORT_SHA -t $REGISTRY/$IMAGE_PATH:latest {{if .BuildContext}}./{{.BuildContext}}{{else}}.{{end}}
    - docker push $REGISTRY/$IMAGE_PATH:$CI_COMMIT_SHORT_SHA
    - docker push $REGISTRY/$IMAGE_PATH:latest
  only:
    - {{.Branch}}

deploy:{{.EnvironmentLabel}}:
  stage: deploy
  image: alpine:latest
  environment:
    name: {{.EnvironmentLabel}}
  before_script:
    - apk add --no-cache curl unzip
    - curl -fsSL https://releases.hashicorp.com/nomad/1.8.4/nomad_1.8.4_linux_amd64.zip -o nomad.zip
    - unzip -o nomad.zip && chmod +x nomad && mv nomad /usr/local/bin/
  script:
    - |
      nomad job run \
        -var="image=$REGISTRY/$IMAGE_PATH:$CI_COMMIT_SHORT_SHA" \
        -namespace="$NOMAD_NAMESPACE" \
        nomad/{{.ServiceName}}.hcl
  only:
    - {{.Branch}}
