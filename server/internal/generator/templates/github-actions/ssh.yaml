name: Deploy {{.ServiceName}} — SSH

on:
  push:
    branches:
      - {{.Branch}}

env:
  SERVICE_NAME: {{.ServiceName}}
  REGISTRY: {{if .RegistryEndpoint}}{{.RegistryEndpoint}}{{else}}ghcr.io{{end}}
  IMAGE_PATH: {{if .ImagePath}}{{.ImagePath}}{{else}}${{ "{{" }} github.repository {{ "}}" }}/{{.ServiceName}}{{end}}
  
permissions:
  contents: read
  packages: write
jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ "{{" }} github.sha {{ "}}" }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ "{{" }} env.REGISTRY {{ "}}" }}
          username: ${{ "{{" }} secrets.REGISTRY_USERNAME {{ "}}" }}
          password: ${{ "{{" }} secrets.REGISTRY_PASSWORD {{ "}}" }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: {{if .BuildContext}}./{{.BuildContext}}{{else}}.{{end}}
          file: {{if .BuildContext}}./{{.BuildContext}}/{{.DockerfileName}}{{else}}{{.DockerfileName}}{{end}}
          push: true
          tags: |
            ${{ "{{" }} env.REGISTRY {{ "}}" }}/${{ "{{" }} env.IMAGE_PATH {{ "}}" }}:${{ "{{" }} github.sha {{ "}}" }}
            ${{ "{{" }} env.REGISTRY {{ "}}" }}/${{ "{{" }} env.IMAGE_PATH {{ "}}" }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to {{.EnvironmentLabel}} via SSH
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: {{.EnvironmentLabel}}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ "{{" }} secrets.SSH_HOST {{ "}}" }}
          username: ${{ "{{" }} secrets.SSH_USER {{ "}}" }}
          key: ${{ "{{" }} secrets.SSH_PRIVATE_KEY {{ "}}" }}
          envs: REGISTRY,IMAGE_PATH
          script: |
            IMAGE_TAG=${{ "{{" }} needs.build-and-push.outputs.image_tag {{ "}}" }}
            cd /opt/services/{{.ServiceName}}
            IMAGE_TAG=${IMAGE_TAG} docker compose pull
            IMAGE_TAG=${IMAGE_TAG} docker compose up -d --remove-orphans
            docker image prune -f
