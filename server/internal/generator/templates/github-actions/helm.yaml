name: Deploy {{.ServiceName}} — Helm

on:
  push:
    branches:
      - {{.Branch}}

env:
  SERVICE_NAME: {{.ServiceName}}
  REGISTRY: {{if .RegistryEndpoint}}{{.RegistryEndpoint}}{{else}}ghcr.io{{end}}
  IMAGE_PATH: {{if .ImagePath}}{{.ImagePath}}{{else}}${{ "{{" }} github.repository {{ "}}" }}/{{.ServiceName}}{{end}}
  K8S_NAMESPACE: {{.K8sNamespace}}

permissions:
  contents: read
  packages: write
  
jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ "{{" }} github.sha {{ "}}" }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ "{{" }} env.REGISTRY {{ "}}" }}
          username: ${{ "{{" }} secrets.REGISTRY_USERNAME {{ "}}" }}
          password: ${{ "{{" }} secrets.REGISTRY_PASSWORD {{ "}}" }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: {{if .BuildContext}}./{{.BuildContext}}{{else}}.{{end}}
          file: {{if .BuildContext}}./{{.BuildContext}}/{{.DockerfileName}}{{else}}{{.DockerfileName}}{{end}}
          push: true
          tags: |
            ${{ "{{" }} env.REGISTRY {{ "}}" }}/${{ "{{" }} env.IMAGE_PATH {{ "}}" }}:${{ "{{" }} github.sha {{ "}}" }}
            ${{ "{{" }} env.REGISTRY {{ "}}" }}/${{ "{{" }} env.IMAGE_PATH {{ "}}" }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to {{.EnvironmentLabel}} via Helm
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: {{.EnvironmentLabel}}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ "{{" }} secrets.KUBE_CONFIG_DATA {{ "}}" }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Deploy with Helm
        env:
          IMAGE_TAG: ${{ "{{" }} needs.build-and-push.outputs.image_tag {{ "}}" }}
        run: |
          helm upgrade --install {{.ServiceName}} ./chart \
            --namespace ${{ "{{" }} env.K8S_NAMESPACE {{ "}}" }} \
            --create-namespace \
            --set image.repository=${{ "{{" }} env.REGISTRY {{ "}}" }}/${{ "{{" }} env.IMAGE_PATH {{ "}}" }} \
            --set image.tag=${IMAGE_TAG} \
            --set environment={{.EnvironmentLabel}} \
            --wait --timeout 120s \
            --atomic
