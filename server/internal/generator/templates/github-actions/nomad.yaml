name: Deploy {{.ServiceName}} — Nomad

on:
  push:
    branches:
      - {{.Branch}}

env:
  SERVICE_NAME: {{.ServiceName}}
  REGISTRY: {{if .RegistryEndpoint}}{{.RegistryEndpoint}}{{else}}ghcr.io{{end}}
  IMAGE_PATH: {{if .ImagePath}}{{.ImagePath}}{{else}}${{ "{{" }} github.repository {{ "}}" }}/{{.ServiceName}}{{end}}
  NOMAD_NAMESPACE: {{.Namespace}}

permissions:
  contents: read
  id-token: write


jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ "{{" }} github.sha {{ "}}" }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ "{{" }} env.REGISTRY {{ "}}" }}
          username: ${{ "{{" }} secrets.REGISTRY_USERNAME {{ "}}" }}
          password: ${{ "{{" }} secrets.REGISTRY_PASSWORD {{ "}}" }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: {{if .BuildContext}}./{{.BuildContext}}{{else}}.{{end}}
          file: {{if .BuildContext}}./{{.BuildContext}}/{{.DockerfileName}}{{else}}{{.DockerfileName}}{{end}}
          push: true
          tags: |
            ${{ "{{" }} env.REGISTRY {{ "}}" }}/${{ "{{" }} env.IMAGE_PATH {{ "}}" }}:${{ "{{" }} github.sha {{ "}}" }}
            ${{ "{{" }} env.REGISTRY {{ "}}" }}/${{ "{{" }} env.IMAGE_PATH {{ "}}" }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to {{.EnvironmentLabel}} via Nomad
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: {{.EnvironmentLabel}}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Nomad
        uses: hashicorp/setup-nomad@main

      - name: Update Nomad job with image tag
        run: |
          sed -i "s|IMAGE_TAG_PLACEHOLDER|${{ "{{" }} needs.build-and-push.outputs.image_tag {{ "}}" }}|g" nomad/{{.ServiceName}}.hcl

      - name: Deploy to Nomad ({{.EnvironmentLabel}})
        env:
          NOMAD_ADDR: ${{ "{{" }} secrets.NOMAD_ADDR {{ "}}" }}
          NOMAD_TOKEN: ${{ "{{" }} secrets.NOMAD_TOKEN {{ "}}" }}
        run: nomad job run nomad/{{.ServiceName}}.hcl
