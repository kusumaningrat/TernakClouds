name: Deploy {{.ServiceName}} — Nomad

on:
  push:
    branches:
      - {{.Branch}}

env:
  SERVICE_NAME: {{.ServiceName}}
  REGISTRY: {{if .RegistryEndpoint}}{{.RegistryEndpoint}}{{else}}ghcr.io{{end}}
  IMAGE_PATH: {{if .ImagePath}}{{.ImagePath}}{{else}}${{ "{{" }} github.repository {{ "}}" }}/{{.ServiceName}}{{end}}
  NOMAD_NAMESPACE: {{.Namespace}}

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ "{{" }} github.sha {{ "}}" }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ "{{" }} env.REGISTRY {{ "}}" }}
          username: ${{ "{{" }} secrets.REGISTRY_USERNAME {{ "}}" }}
          password: ${{ "{{" }} secrets.REGISTRY_PASSWORD {{ "}}" }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ "{{" }} env.REGISTRY {{ "}}" }}/${{ "{{" }} env.IMAGE_PATH {{ "}}" }}:${{ "{{" }} github.sha {{ "}}" }}
            ${{ "{{" }} env.REGISTRY {{ "}}" }}/${{ "{{" }} env.IMAGE_PATH {{ "}}" }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to {{.EnvironmentLabel}} via Nomad
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: {{.EnvironmentLabel}}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nomad CLI
        run: |
          curl -fsSL https://releases.hashicorp.com/nomad/1.8.4/nomad_1.8.4_linux_amd64.zip -o nomad.zip
          unzip -o nomad.zip && chmod +x nomad && sudo mv nomad /usr/local/bin/

      - name: Deploy Nomad job
        env:
          NOMAD_ADDR: ${{ "{{" }} secrets.NOMAD_ADDR {{ "}}" }}
          NOMAD_TOKEN: ${{ "{{" }} secrets.NOMAD_TOKEN {{ "}}" }}
          IMAGE_TAG: ${{ "{{" }} needs.build-and-push.outputs.image_tag {{ "}}" }}
        run: |
          nomad job run \
            -var="image=${{ "{{" }} env.REGISTRY {{ "}}" }}/${{ "{{" }} env.IMAGE_PATH {{ "}}" }}:${IMAGE_TAG}" \
            -namespace="${NOMAD_NAMESPACE}" \
            {{.ServiceName}}.nomad.hcl
